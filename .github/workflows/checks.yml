on:
  push:
    branches:
      - main
  pull_request:

jobs:
  Checks:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: DeterminateSystems/flake-checker-action@main
        with:
          fail-mode: true

      - uses: DeterminateSystems/determinate-nix-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Nix formatting
        run: git ls-files '*.nix' | xargs nix develop -c nixfmt --check

      - name: Rust formatting
        if: success() || failure()
        run: nix develop -c cargo fmt --check

      - name: Clippy
        if: success() || failure()
        run: nix develop -c cargo clippy -- -D clippy::all

      - name: Cargo tests
        if: success() || failure()
        run: nix develop -c cargo test

  DeterminateCI:
    needs: Checks
    uses: DeterminateSystems/ci/.github/workflows/workflow.yml@main
    permissions:
      id-token: write
      contents: read
